name: "BUILD: 빌드 파일 수정"
description: 패키지 매니저, 빌드 도구 등의 설정 변경을 기록합니다.
title: "[BUILD] "
labels: ["build"]
body:
  - type: input
    id: summary
    attributes:
      label: 📦 요약
      description: 빌드 관련 변경 사항에 대한 간단한 설명
      placeholder: 예) JWT 라이브러리 의존성 추가 및 빌드 스크립트 수정
    validations:
      required: true

  - type: textarea
    id: detail
    attributes:
      label: 🔧 변경 내용
      description: 패키지/의존성 변경 사항이나 빌드 설정 수정 사항을 적어주세요.
      placeholder: |
        - `package.json`에서 `react` 버전 업그레이드 (17 -> 18)
        - `build.gradle`에 JWT 관련 라이브러리 추가
        - Webpack/Vite 설정 파일 수정
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: ✅ 세부 작업 (체크리스트)
      description: 이번 이슈에서 처리해야 할 세부 작업 항목들을 작성해주세요.
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: false