name: "BUILD: 빌드 파일 수정"
description: 패키지 매니저, 빌드 도구 등의 설정 변경을 기록합니다.
title: "[BUILD] "
labels: ["build"]
body:
  - type: input
    id: summary
    attributes:
      label: 📦 요약
      description: 빌드 관련 변경 사항에 대한 간단한 설명
      placeholder: 예) JWT 라이브러리 의존성 추가 및 빌드 스크립트 수정
    validations:
      required: true

  - type: textarea
    id: detail
    attributes:
      label: 🔧 변경 내용
      description: 패키지/의존성 변경 사항이나 빌드 설정 수정 사항을 적어주세요.
      placeholder: |
        - `package.json`에서 `react` 버전 업그레이드 (17 -> 18)
        - `build.gradle`에 JWT 관련 라이브러리 추가
        - Webpack/Vite 설정 파일 수정
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: ✅ 체크리스트
      options:
        - label: 로컬 환경에서 빌드 성공 확인
        - label: CI 파이프라인 정상 통과 확인
        - label: 팀원들에게 의존성/환경 업데이트 필요성 공유