name: "DOCS: 문서"
description: 문서 추가/수정/보완
title: "[DOCS] "
labels: ["documentation"]
body:
  - type: textarea
    id: change
    attributes:
      label: 변경 내용
      placeholder: 예) README 설치 가이드 보완, API 문서 업데이트
    validations:
      required: true

  - type: textarea
    id: related
    attributes:
      label: 관련 이슈/PR
      placeholder: #123, #456
    validations:
      required: false

  - type: textarea
    id: checklist
    attributes:
      label: ✅ 세부 작업 (체크리스트)
      description: 이번 이슈에서 처리해야 할 세부 작업 항목들을 작성해주세요.
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: false